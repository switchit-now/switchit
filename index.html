<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwitchIt</title>

<style>
body{
  font-family: Arial;
  background:#f2f2f2;
  margin:0;
  text-align:center;
}
.container{
  background:white;
  margin:30px;
  padding:20px;
  border-radius:15px;
}
input,select,button{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#0a66c2;
  color:white;
  font-weight:bold;
}
.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
<h2>Login</h2>
<input type="text" id="name" placeholder="Enter Name">
<input type="number" id="phone" placeholder="Phone Number">
<select id="role">
<option value="">Select Role</option>
<option value="order">Order</option>
<option value="delivery">Delivery Partner</option>
</select>
<button onclick="login()">Continue</button>
</div>

<!-- ORDER PAGE -->
<div class="container hidden" id="orderPage">
<h2>Place Order</h2>
<input type="text" id="custName" placeholder="Name">
<input type="number" id="custPhone" placeholder="Phone">
<input type="text" id="pickup" placeholder="Pickup Location">
<input type="text" id="drop" placeholder="Delivery Location">

<button onclick="sendOrder()">Send Order</button>
</div>

<!-- DELIVERY PAGE -->
<div class="container hidden" id="deliveryPage">
<h2>Delivery Partner</h2>
<p id="orderDetails"></p>

<input type="text" placeholder="Aadhar Number">
<input type="file">
<input type="file">

<button onclick="openMap()">Open Map</button>
</div>

<script>
let globalData={};

function login(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let role=document.getElementById("role").value;

if(name==""||phone==""||role==""){
alert("Fill all details");
return;
}

globalData.name=name;
globalData.phone=phone;

document.getElementById("login").classList.add("hidden");

if(role=="order"){
document.getElementById("orderPage").classList.remove("hidden");
}else{
document.getElementById("deliveryPage").classList.remove("hidden");
document.getElementById("orderDetails").innerText="Waiting for orders...";
}
}

function sendOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;

if(name==""||phone==""||pickup==""||drop==""){
alert("Fill all details");
return;
}

let msg=`New Order:%0AName:${name}%0APhone:${phone}%0APickup:${pickup}%0ADelivery:${drop}`;

window.open(`https://wa.me/919943594647?text=${msg}`);

alert("Order sent to WhatsApp!");

localStorage.setItem("order", JSON.stringify({name,phone,pickup,drop}));
}

window.onload=function(){
let data=localStorage.getItem("order");
if(data){
let d=JSON.parse(data);
document.getElementById("orderDetails").innerText=
`Name: ${d.name}
Phone: ${d.phone}
Pickup: ${d.pickup}
Drop: ${d.drop}`;
}
}

function openMap(){
let data=JSON.parse(localStorage.getItem("order"));
if(!data){alert("No order");return;}

let url=`https://www.google.com/maps/dir/${data.pickup}/${data.drop}`;
window.open(url);
}
</script>

</body>
</html>
