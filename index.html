<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwitchIt</title>

<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  margin:0;
  text-align:center;
}
.container{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}
input,select,button{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#0a66c2;
  color:white;
  font-weight:bold;
}
.hidden{display:none;}
.logo{width:150px;}
.card{
  border:1px solid #ccc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
<img src="logo.png" class="logo">
<h2>Welcome</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="role">
<option value="">Select Role</option>
<option value="order">Order</option>
<option value="delivery">Delivery Partner</option>
</select>

<button onclick="login()">Continue</button>
</div>

<!-- ORDER -->
<div class="container hidden" id="orderPage">
<h2>Place Order</h2>

<input id="custName" placeholder="Name">
<input id="custPhone" placeholder="Phone">
<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="sendOrder()">🚀 Send Order</button>
</div>

<!-- DELIVERY -->
<div class="container hidden" id="deliveryPage">
<h2>Delivery Panel</h2>

<div id="ordersList"></div>

<input placeholder="Aadhar Number">
<input type="file">
<input type="file">

</div>

<script>

let liveLocationLink="";

// LOGIN
function login(){
if(name.value==""||phone.value==""||role.value==""){
alert("Fill all details"); return;
}

login.style.display="none";

if(role.value=="order"){
orderPage.classList.remove("hidden");
}else{
deliveryPage.classList.remove("hidden");
loadOrders();
}
}

// LOCATION (with fallback)
function getLocation(){

if(!navigator.geolocation){
openFallback(); return;
}

navigator.geolocation.getCurrentPosition(
(pos)=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
liveLocationLink=`https://www.google.com/maps?q=${lat},${lon}`;
alert("Location captured 📍");
},
()=>{
alert("Permission denied ❌");
openFallback();
}
);

}

function openFallback(){
window.open("https://www.google.com/maps");
alert("Select location manually");
}

// SEND ORDER
function sendOrder(){

if(custName.value==""||custPhone.value==""||pickup.value==""||drop.value==""){
alert("Fill all"); return;
}

let order={
name:custName.value,
phone:custPhone.value,
pickup:pickup.value,
drop:drop.value,
location:liveLocationLink,
status:"Pending"
};

let arr=JSON.parse(localStorage.getItem("orders"))||[];
arr.push(order);
localStorage.setItem("orders",JSON.stringify(arr));

// WhatsApp send
let msg=`🚚 Order:
Name:${order.name}
Phone:${order.phone}
Pickup:${order.pickup}
Drop:${order.drop}
Location:${order.location}`;

window.open(`https://wa.me/919943594647?text=${encodeURIComponent(msg)}`);

alert("Order sent 🔥");

}

// LOAD ORDERS
function loadOrders(){

let arr=JSON.parse(localStorage.getItem("orders"))||[];
let html="";

arr.forEach((o,i)=>{

html+=`
<div class="card">
<b>${o.name}</b><br>
${o.phone}<br>
${o.pickup} → ${o.drop}<br>
Status: ${o.status}<br><br>

<button onclick="accept(${i})">Accept</button>
<button onclick="reject(${i})">Reject</button>
<button onclick="done(${i})">Done</button><br><br>

<button onclick="callUser('${o.phone}')">📞 Call</button>
<button onclick="chatUser('${o.phone}')">💬 WhatsApp</button>
<button onclick="map('${o.pickup}','${o.drop}')">🗺️ Map</button>
</div>
`;

});

ordersList.innerHTML=html;

}

// STATUS
function accept(i){
updateStatus(i,"Accepted");
}
function reject(i){
updateStatus(i,"Rejected");
}
function done(i){
updateStatus(i,"Delivered");
}

function updateStatus(i,status){
let arr=JSON.parse(localStorage.getItem("orders"));
arr[i].status=status;
localStorage.setItem("orders",JSON.stringify(arr));
loadOrders();
}

// CALL
function callUser(num){
window.open("tel:"+num);
}

// WHATSAPP
function chatUser(num){
window.open("https://wa.me/91"+num);
}

// MAP
function map(p,d){
window.open(`https://www.google.com/maps/dir/${p}/${d}`);
}

</script>

</body>
</html>
