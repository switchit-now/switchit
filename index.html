<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwitchIt</title>

<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  margin:0;
  text-align:center;
}
.container{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:15px;
}
input,select,button{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  background:#0a66c2;
  color:white;
  font-weight:bold;
}
.hidden{display:none;}
.logo{width:150px;}
.card{
  border:1px solid #ccc;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
<img src="logo.png" class="logo">
<h2>SwitchIt</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">

<select id="role">
<option value="">Select Role</option>
<option value="order">Order</option>
<option value="delivery">Delivery Partner</option>
<option value="admin">Admin</option>
</select>

<button onclick="loginUser()">Continue</button>
</div>

<!-- ORDER -->
<div class="container hidden" id="orderPage">
<h2>Place Order</h2>

<input id="custName" placeholder="Name">
<input id="custPhone" placeholder="Phone">
<input id="pickup" placeholder="Pickup">
<input id="drop" placeholder="Drop">

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="sendOrder()">🚀 Send Order</button>
</div>

<!-- DELIVERY -->
<div class="container hidden" id="deliveryPage">
<h2>Delivery Panel</h2>
<div id="ordersList"></div>

<input placeholder="Aadhar Number">
<input type="file">
<input type="file">
</div>

<!-- ADMIN -->
<div class="container hidden" id="adminPage">
<h2>Admin Panel</h2>
<div id="adminOrders"></div>
</div>

<script>

let liveLocationLink="";

// LOGIN
function loginUser(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let role=document.getElementById("role").value;

if(name==""||phone==""||role==""){
alert("Fill all details pa 😅"); return;
}

document.getElementById("login").style.display="none";

if(role==="order"){
orderPage.classList.remove("hidden");
}
else if(role==="delivery"){
deliveryPage.classList.remove("hidden");
loadOrders();
}
else if(role==="admin"){
adminPage.classList.remove("hidden");
loadAdmin();
}
}

// LOCATION
function getLocation(){
if(!navigator.geolocation){
window.open("https://maps.google.com");
return;
}

navigator.geolocation.getCurrentPosition(
(pos)=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
liveLocationLink=`https://www.google.com/maps?q=${lat},${lon}`;
alert("Location captured 📍");
},
()=>{
window.open("https://maps.google.com");
alert("Select manually");
}
);
}

// SEND ORDER
function sendOrder(){
let name=custName.value;
let phone=custPhone.value;
let pickup=pickup.value;
let drop=drop.value;

if(name==""||phone==""||pickup==""||drop==""){
alert("Fill all details"); return;
}

let order={
name,phone,pickup,drop,
location:liveLocationLink,
status:"Pending"
};

let arr=JSON.parse(localStorage.getItem("orders"))||[];
arr.push(order);
localStorage.setItem("orders",JSON.stringify(arr));

let msg=`🚚 Order:
Name:${name}
Phone:${phone}
Pickup:${pickup}
Drop:${drop}
Location:${liveLocationLink}`;

window.open(`https://wa.me/919943594647?text=${encodeURIComponent(msg)}`);

alert("Order sent 🔥");
}

// LOAD DELIVERY ORDERS
function loadOrders(){
let arr=JSON.parse(localStorage.getItem("orders"))||[];
let html="";

arr.forEach((o,i)=>{
html+=`
<div class="card">
<b>${o.name}</b><br>
${o.phone}<br>
${o.pickup} → ${o.drop}<br>
Status: ${o.status}<br><br>

<button onclick="updateStatus(${i},'Accepted')">Accept</button>
<button onclick="updateStatus(${i},'Rejected')">Reject</button>
<button onclick="updateStatus(${i},'Delivered')">Done</button><br><br>

<button onclick="callUser('${o.phone}')">📞 Call</button>
<button onclick="chatUser('${o.phone}')">💬 WhatsApp</button>
<button onclick="openMap('${o.pickup}','${o.drop}')">🗺️ Map</button>
</div>
`;
});

ordersList.innerHTML=html;
}

// ADMIN PANEL
function loadAdmin(){
let arr=JSON.parse(localStorage.getItem("orders"))||[];
let html="";

arr.forEach((o,i)=>{
html+=`
<div class="card">
${o.name} - ${o.pickup} → ${o.drop}<br>
Status: ${o.status}<br>
<button onclick="deleteOrder(${i})">Delete</button>
</div>
`;
});

adminOrders.innerHTML=html;
}

function deleteOrder(i){
let arr=JSON.parse(localStorage.getItem("orders"));
arr.splice(i,1);
localStorage.setItem("orders",JSON.stringify(arr));
loadAdmin();
}

// STATUS UPDATE
function updateStatus(i,status){
let arr=JSON.parse(localStorage.getItem("orders"));
arr[i].status=status;
localStorage.setItem("orders",JSON.stringify(arr));
loadOrders();
}

// CALL
function callUser(num){
window.open("tel:"+num);
}

// WHATSAPP
function chatUser(num){
window.open("https://wa.me/91"+num);
}

// MAP
function openMap(p,d){
window.open(`https://www.google.com/maps/dir/${p}/${d}`);
}

</script>

</body>
</html>
